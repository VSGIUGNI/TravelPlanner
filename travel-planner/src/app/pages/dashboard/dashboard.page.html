<ion-header>
  <ion-toolbar>
    <ion-title>Travel Planner</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Lista de viagens -->
  <ion-list>
    <ion-item *ngFor="let travel of travels">
      <ion-label>
        <h2>{{ travel.description }}</h2>
        <p>{{ travel.startAt | date }} - {{ travel.endAt | date }}</p>
      </ion-label>
      <ion-button fill="outline" [routerLink]="['/travel', travel.id]">
        Detalhes
      </ion-button>
    </ion-item>
  </ion-list>

  <!-- Botão para criar nova viagem -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button [routerLink]="['/create-travel']">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>

<!-- Barra de navegação -->
<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="dashboard" [routerLink]="['/dashboard']">
      <ion-icon name="home"></ion-icon>
      <ion-label>Início</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="map" [routerLink]="['/map']">
      <ion-icon name="map"></ion-icon>
      <ion-label>Mapa</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="comments" [routerLink]="['/comments']">
      <ion-icon name="chatbubbles"></ion-icon>
      <ion-label>Comentários</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
